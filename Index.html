<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Kristy Haven – premium beauty & skincare for your daily glow. Shop lip gloss, facial masks, pimple patches. Confidence and self-care essentials.">
  <title>Kristy Haven | Glow with Confidence 🇳🇬</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #fffaf8;
      color: #2d2a2a;
      overflow-x: hidden;
    }
    ::selection { background: #f3cfc6; }
    .glow-hover {
      transition: all 0.3s ease;
    }
    .glow-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(230, 150, 130, 0.25);
      border-color: rgba(212, 163, 115, 0.3);
    }
    .gold-text { color: #c9a87b; }
    .btn-primary {
      background: #d9b48b;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      transition: 0.25s;
      cursor: pointer;
      display: inline-block;
    }
    .btn-primary:hover { background: #c29a6b; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #d9b48b;
      color: #b47c48;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
    }
    .btn-outline:hover { background: #d9b48b20; }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 5%;
      background: #ffffffdd;
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #f7e6df;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e6bc9c, #b17e56);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      color: #3e2e26;
      font-weight: 500;
      transition: 0.2s;
    }
    .nav-links a:hover { color: #c28b60; }
    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.4rem;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: #d9b48b;
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 6px;
      font-weight: bold;
    }
    .menu-icon {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
    }
    @media (max-width: 850px) {
      .nav-links {
        position: fixed;
        top: 70px;
        left: -100%;
        background: white;
        width: 70%;
        height: 100vh;
        flex-direction: column;
        padding-top: 2rem;
        transition: 0.3s;
        box-shadow: 4px 0 20px rgba(0,0,0,0.05);
        z-index: 999;
        gap: 1.8rem;
      }
      .nav-links.active { left: 0; }
      .menu-icon { display: block; }
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 5%;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      padding: 2rem 0 1rem;
    }
    .hero-text { flex: 1; }
    .hero-text h1 { font-size: 3rem; font-weight: 600; line-height: 1.2; }
    .hero-text p { font-size: 1.2rem; margin: 1rem 0 1.8rem; color: #5c4b3e; }
    .hero-img { flex: 1; text-align: center; }
    .hero-img img { max-width: 100%; border-radius: 48px; }
    .section-title {
      font-size: 2rem;
      margin: 2rem 0 1.5rem;
      position: relative;
      display: inline-block;
    }
    .section-title:after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 60%;
      height: 3px;
      background: #ecd9cc;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }
    .product-card {
      background: white;
      border-radius: 32px;
      padding: 1.2rem;
      transition: all 0.25s;
      border: 1px solid #f8ede8;
      cursor: pointer;
    }
    .product-card img {
      width: 100%;
      border-radius: 24px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #fef6f2;
    }
    .product-title { font-weight: 600; margin: 1rem 0 0.3rem; }
    .product-price { color: #b68454; font-weight: 600; }
    .testimonial-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin: 2rem 0;
    }
    .testimonial {
      background: #ffffffd9;
      padding: 1.5rem;
      border-radius: 28px;
      flex: 1;
      border: 1px solid #fae9e2;
    }
    .before-after {
      background: linear-gradient(145deg, #fef5f0, #fff7f3);
      border-radius: 48px;
      padding: 2rem;
      margin: 3rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: center;
    }
    .ba-images { display: flex; gap: 1rem; flex: 1; justify-content: center; }
    .ba-card {
      background: white;
      border-radius: 32px;
      padding: 1rem;
      text-align: center;
      width: 160px;
    }
    .ba-card img { width: 100%; border-radius: 20px; }
    footer {
      background: #fff3ed;
      margin-top: 3rem;
      padding: 2rem 5%;
      text-align: center;
      border-radius: 40px 40px 0 0;
    }
    .cart-modal {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 400px;
      max-width: 90%;
      background: white;
      height: 100%;
      z-index: 1100;
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      padding: 1.5rem;
      overflow-y: auto;
    }
    .cart-modal.open { display: block; }
    .overlay {
      display: none;
      position: fixed;
      top:0; left:0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 1050;
    }
    .overlay.active { display: block; }
    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      border: 1px solid #edd9cf;
      margin: 0.5rem 0;
    }
    .payment-container {
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05);
      max-width: 750px;
      margin: 2rem auto;
      border: 1px solid #fae1d4;
    }
    .order-summary {
      background: #fef7f3;
      border-radius: 24px;
      padding: 1.2rem;
      margin: 1.5rem 0;
    }
    .bank-details-card {
      background: #fef5f0;
      border-radius: 24px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      border: 1px solid #e9cfc0;
    }
    .bank-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #eed9cf;
    }
    .bank-detail-row:last-child { border-bottom: none; }
    .copy-btn {
      background: none;
      border: none;
      color: #d9b48b;
      cursor: pointer;
      margin-left: 8px;
      font-size: 0.9rem;
    }
    .copy-btn:hover { color: #b68454; }
    .upload-area {
      border: 2px dashed #edd9cf;
      border-radius: 24px;
      padding: 1.5rem;
      text-align: center;
      margin: 1rem 0;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-area:hover { background: #fffaf5; border-color: #d9b48b; }
    .naira-badge {
      font-size: 0.75rem;
      background: #f5e6df;
      display: inline-block;
      padding: 2px 10px;
      border-radius: 40px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 1rem;
      border-radius: 20px;
      margin-top: 1rem;
      text-align: center;
    }
    @media (max-width: 640px) {
      .hero-text h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">✦ Kristy Haven <span class="naira-badge">NG</span></div>
  <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
  <div class="nav-links" id="navLinks">
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="shop">Shop</a>
    <a href="#" data-page="about">About</a>
    <a href="#" data-page="contact">Contact</a>
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-shopping-bag"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay"></div>
<div class="cart-modal" id="cartModal">
  <h3>Your Cart 🛍️</h3>
  <div id="cartItemsList"></div>
  <div id="cartTotal" style="font-weight: bold; margin: 1rem 0;"></div>
  <button class="btn-primary" id="proceedToPaymentBtn">Proceed to Payment (Bank Transfer)</button>
  <button class="btn-outline" id="closeCartBtn" style="margin-top: 1rem;">Close</button>
  <div style="margin-top: 1rem; font-size: 0.8rem;">🔒 Bank Transfer only | Free delivery over ₦50,000</div>
</div>

<main id="app"></main>

<footer>
  <div class="social-icons" style="margin-bottom: 1rem;">
    <a href="#" style="color:#b68454; margin:0 10px;"><i class="fab fa-instagram fa-lg"></i></a>
    <a href="#" style="color:#b68454; margin:0 10px;"><i class="fab fa-facebook"></i></a>
    <a href="#" style="color:#b68454; margin:0 10px;"><i class="fab fa-tiktok"></i></a>
  </div>
  <p>© 2025 Kristy Haven — Glow from within ✨ | Prices in ₦ (Nigerian Naira)</p>
  <div style="margin-top: 0.5rem;">
    <span>📧 hello@kristyhaven.com</span> | <span>📞 +234 901 234 5678</span>
  </div>
</footer>

<script>
  // PRODUCTS (₦ Naira)
  const products = [
    { id: 1, name: "Rosebud Lip Gloss", category: "lipgloss", price: 27900, rating: 4.8, img: "https://placehold.co/600x600/ffe6dd/ccaa88?text=💋+Gloss", description: "High-shine, non-sticky, infused with rosehip oil." },
    { id: 2, name: "Golden Glow Facial Mask", category: "mask", price: 49600, rating: 4.9, img: "https://placehold.co/600x600/fcece4/cfaa8a?text=✨+Mask", description: "Brightening sheet mask with vitamin C & gold extract." },
    { id: 3, name: "Clear Rescue Pimple Patch", category: "patch", price: 18600, rating: 4.7, img: "https://placehold.co/600x600/f3e0d8/b8886c?text=🌟+Patch", description: "Hydrocolloid patches with tea tree oil." },
    { id: 4, name: "Velvet Matte Lip Oil", category: "lipgloss", price: 34100, rating: 4.9, img: "https://placehold.co/600x600/fae1d4/c39870?text=💄+Lip+Oil", description: "Lightweight, nourishing color." },
    { id: 5, name: "Overnight Recovery Mask", category: "mask", price: 58900, rating: 5.0, img: "https://placehold.co/600x600/ffe8e0/c2976e?text=🌙+Sleep+Mask", description: "Wake up to plump, glowing skin." },
    { id: 6, name: "Star Hydrocolloid Patches", category: "patch", price: 21700, rating: 4.6, img: "https://placehold.co/600x600/f7e0d6/b97f58?text=⭐+Patches", description: "Cute star shape, works overnight." }
  ];

  let cart = [];
  let currentPage = "home";

  function formatNaira(amount) {
    return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', minimumFractionDigits: 0 }).format(amount);
  }

  function updateCartCountUI() {
    const total = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById('cartCount').innerText = total;
    if (document.getElementById('cartItemsList')) renderCartModal();
  }

  function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    const existing = cart.find(item => item.id === productId);
    if (existing) existing.quantity++;
    else cart.push({ ...product, quantity: 1 });
    updateCartCountUI();
    showNotification("Added to cart ✨ " + formatNaira(product.price));
  }

  function showNotification(msg) {
    let notif = document.createElement('div');
    notif.innerText = msg;
    notif.style.position = 'fixed';
    notif.style.bottom = '20px';
    notif.style.left = '20px';
    notif.style.backgroundColor = '#d9b48b';
    notif.style.color = 'white';
    notif.style.padding = '10px 20px';
    notif.style.borderRadius = '40px';
    notif.style.zIndex = '1200';
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 1800);
  }

  function renderCartModal() {
    const container = document.getElementById('cartItemsList');
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = "<p>Your cart is empty 💕 Add some glow!</p>";
      document.getElementById('cartTotal').innerHTML = "";
      return;
    }
    let html = "";
    let total = 0;
    cart.forEach(item => {
      total += item.price * item.quantity;
      html += `<div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
        <div><strong>${item.name}</strong> x${item.quantity}</div>
        <div>${formatNaira(item.price * item.quantity)} 
          <button class="remove-item" data-id="${item.id}" style="background:none; border:none; color:#b68454;"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>`;
    });
    container.innerHTML = html;
    document.getElementById('cartTotal').innerHTML = `<strong>Total: ${formatNaira(total)}</strong>`;
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        cart = cart.filter(item => item.id !== id);
        updateCartCountUI();
        renderCartModal();
      });
    });
  }

  // BANK TRANSFER PAYMENT PAGE (Realistic Bank Details)
  function renderPaymentPage() {
    const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    if (cart.length === 0) {
      return `<div class="container" style="text-align:center;"><h2>Your cart is empty 🛒</h2><p>Add some glow products first.</p><button class="btn-primary" id="backToShopBtn">Continue Shopping</button></div>`;
    }
    return `
      <div class="container">
        <div class="payment-container">
          <h2 style="text-align:center;">💸 Complete Your Payment</h2>
          <p style="text-align:center; color:#7a5a48;">Make a bank transfer to confirm your order ✨</p>
          
          <div class="order-summary">
            <h3>Order Summary</h3>
            ${cart.map(item => `<div style="display:flex; justify-content:space-between; margin:8px 0;"><span>${item.name} x${item.quantity}</span><span>${formatNaira(item.price * item.quantity)}</span></div>`).join('')}
            <hr style="margin:12px 0; border-color:#edd9cf;">
            <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>Total Amount to Pay</span><span style="font-size:1.3rem;">${formatNaira(totalAmount)}</span></div>
            <div style="font-size:12px; margin-top:8px;">🚚 Free delivery on orders over ₦50,000</div>
          </div>

          <div class="bank-details-card">
            <h3><i class="fas fa-university"></i> Bank Transfer Details</h3>
            <div class="bank-detail-row">
              <span><strong>Bank Name:</strong></span>
              <span>First Bank of Nigeria <button class="copy-btn" data-copy="First Bank of Nigeria"><i class="fas fa-copy"></i></button></span>
            </div>
            <div class="bank-detail-row">
              <span><strong>Account Name:</strong></span>
              <span>Kristy Haven Beauty Ltd <button class="copy-btn" data-copy="Kristy Haven Beauty Ltd"><i class="fas fa-copy"></i></button></span>
            </div>
            <div class="bank-detail-row">
              <span><strong>Account Number:</strong></span>
              <span>2034567890 <button class="copy-btn" data-copy="2034567890"><i class="fas fa-copy"></i></button></span>
            </div>
            <div class="bank-detail-row">
              <span><strong>Amount to Transfer:</strong></span>
              <span>${formatNaira(totalAmount)} <button class="copy-btn" data-copy="${totalAmount}"><i class="fas fa-copy"></i></button></span>
            </div>
            <div class="bank-detail-row">
              <span><strong>Reference / Narration:</strong></span>
              <span>YOUR_EMAIL_OR_PHONE <button class="copy-btn" data-copy="KRISTY_${Date.now()}"><i class="fas fa-copy"></i></button></span>
            </div>
            <p style="margin-top: 12px; font-size: 0.8rem; color: #b68454;"><i class="fas fa-info-circle"></i> Use your email or phone as narration for easy confirmation.</p>
          </div>

          <div style="margin: 1.5rem 0;">
            <label><strong>Your Full Name</strong></label>
            <input type="text" id="customerName" placeholder="e.g., Adaobi Okafor" required>
            <label><strong>Phone Number</strong></label>
            <input type="tel" id="customerPhone" placeholder="0803 123 4567" required>
            <label><strong>Delivery Address</strong></label>
            <textarea id="customerAddress" rows="2" placeholder="Street, City, State" required></textarea>
            <label><strong>Email Address</strong></label>
            <input type="email" id="customerEmail" placeholder="you@example.com" required>
          </div>

          <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt fa-2x" style="color:#d9b48b;"></i>
            <p>Click or drag to upload payment receipt/screenshot</p>
            <input type="file" id="receiptUpload" accept="image/*,.pdf" style="display:none;">
            <p id="fileNameDisplay" style="font-size:12px; margin-top:8px; color:#b68454;"></p>
          </div>

          <button class="btn-primary" id="finalConfirmPaymentBtn" style="width:100%;">I Have Made the Transfer — Confirm Order</button>
          <button class="btn-outline" id="backToCartFromPayment" style="width:100%; margin-top:12px;">← Back to Cart</button>
        </div>
      </div>
    `;
  }

  function attachPaymentEvents() {
    // Copy functionality
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const textToCopy = btn.dataset.copy;
        navigator.clipboard.writeText(textToCopy);
        showNotification(`Copied: ${textToCopy}`);
      });
    });

    // File upload handling
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('receiptUpload');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    
    if (uploadArea) {
      uploadArea.addEventListener('click', () => fileInput.click());
      uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#d9b48b'; });
      uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#edd9cf');
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(file);
      });
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleFileUpload(e.target.files[0]);
      });
    }

    function handleFileUpload(file) {
      if (file.type.startsWith('image/') || file.type === 'application/pdf') {
        fileNameDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Uploaded: ${file.name}`;
        showNotification('Receipt uploaded successfully');
      } else {
        alert('Please upload an image or PDF file');
      }
    }

    const confirmBtn = document.getElementById('finalConfirmPaymentBtn');
    if (confirmBtn) {
      confirmBtn.onclick = () => {
        const name = document.getElementById('customerName')?.value.trim();
        const phone = document.getElementById('customerPhone')?.value.trim();
        const address = document.getElementById('customerAddress')?.value.trim();
        const email = document.getElementById('customerEmail')?.value.trim();
        const hasReceipt = fileNameDisplay?.innerHTML.includes('Uploaded:');
        
        if (!name || !phone || !address || !email) {
          alert("Please fill in all delivery details ✨");
          return;
        }
        if (!hasReceipt) {
          alert("Please upload your payment receipt/screenshot to confirm your transfer 💸");
          return;
        }
        
        const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        // Show success message and clear cart
        const paymentContainer = document.querySelector('.payment-container');
        paymentContainer.innerHTML = `
          <div class="success-message">
            <i class="fas fa-check-circle fa-3x" style="color:#d9b48b;"></i>
            <h3>Payment Confirmed! ✨</h3>
            <p>Thank you ${name}, your order of ${formatNaira(total)} has been received.</p>
            <p>We will verify your bank transfer and send a confirmation email to <strong>${email}</strong> within 2 hours.</p>
            <p>Delivery will be made to: ${address}</p>
            <p style="margin-top: 1rem;">💖 Your glow is on the way!</p>
            <button class="btn-primary" id="continueShoppingBtn" style="margin-top:1rem;">Continue Shopping</button>
          </div>
        `;
        cart = [];
        updateCartCountUI();
        document.getElementById('continueShoppingBtn')?.addEventListener('click', () => loadPage("home"));
      };
    }
    
    const backBtn = document.getElementById('backToCartFromPayment');
    if (backBtn) backBtn.onclick = () => { openCart(); loadPage("home"); };
  }

  // PAGE RENDERING FUNCTIONS (Home, Shop, About, Contact)
  function renderHome() {
    return `
      <div class="container">
        <div class="hero">
          <div class="hero-text">
            <h1>Your daily glow starts here ✨</h1>
            <p>Luminous skin, glossy lips, and pure confidence — Kristy Haven brings self-care to life. Now in Nigeria 🇳🇬</p>
            <button class="btn-primary" id="heroShopBtn">Shop Now →</button>
          </div>
          <div class="hero-img"><img src="https://placehold.co/600x500/fef1ea/c29a6b?text=Glow+Model" alt="glow model"></div>
        </div>
        <div class="section-title">⭐ Bestsellers</div>
        <div class="product-grid" id="featuredGrid"></div>
        <div class="section-title">💬 Love Notes</div>
        <div class="testimonial-grid">
          <div class="testimonial">“The facial mask transformed my skin! Worth every naira.” – Ada, Lagos</div>
          <div class="testimonial">“Best pimple patches ever — works overnight.” – Zara, Abuja</div>
          <div class="testimonial">“Lip gloss gives that perfect shine. I'm obsessed.” – Tolu, PH</div>
        </div>
        <div class="before-after">
          <div><h3>Before & After ✨ Glow Transformation</h3><p>Real results with Overnight Recovery Mask.</p></div>
          <div class="ba-images"><div class="ba-card"><img src="https://placehold.co/200x200/f3d7cb/c1845b?text=Before"><p>Before</p></div><div class="ba-card"><img src="https://placehold.co/200x200/ffe2d4/c28f62?text=After"><p>After ✨</p></div></div>
        </div>
        <div style="text-align: center; margin: 3rem 0;"><p><strong>Look good. Feel confident. Own your day 💅</strong></p></div>
      </div>`;
  }

  function renderShop() {
    return `<div class="container"><h2>Shop All Glow 🛍️</h2><p>Prices in Nigerian Naira (₦) — Bank Transfer only at checkout</p>
      <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
        <button class="filter-btn btn-outline" data-filter="all">All</button>
        <button class="filter-btn btn-outline" data-filter="lipgloss">Lip Gloss</button>
        <button class="filter-btn btn-outline" data-filter="mask">Facial Masks</button>
        <button class="filter-btn btn-outline" data-filter="patch">Pimple Patches</button>
      </div>
      <div class="product-grid" id="shopGrid"></div>
    </div>`;
  }

  function renderProductDetail(productId) {
    const p = products.find(prod => prod.id == productId);
    if (!p) return "<div>Product not found</div>";
    return `<div class="container"><div style="display:flex; flex-wrap:wrap; gap:2rem;"><div style="flex:1"><img src="${p.img}" style="width:100%; border-radius: 32px;"></div><div style="flex:1"><h2>${p.name}</h2><p class="gold-text">★★★★★ ${p.rating}</p><p>${p.description}</p><h3>${formatNaira(p.price)}</h3><button class="btn-primary" id="detailAddToCart">Add to Cart 🛒</button><button class="btn-outline" id="detailBuyNow">Buy Now →</button></div></div></div>`;
  }

  function renderAbout() {
    return `<div class="container"><h2>Our Story ✨ Kristy Haven</h2><p>Kristy Haven was born from a desire to blend science with soul — skincare that makes you feel radiant inside out. Now serving the vibrant beauty community in Nigeria with love.</p><div style="background:#fcf2ec; border-radius:48px; margin:2rem 0; padding:2rem;"><h3>🌸 Our Mission</h3><p>To empower everyone to embrace their natural glow, build confidence, and practice self-love every single day.</p></div></div>`;
  }

  function renderContact() {
    return `<div class="container"><h2>Get in touch 📬</h2><div style="display:flex; flex-wrap:wrap; gap:3rem;"><div style="flex:1"><form id="contactForm"><input type="text" placeholder="Your name" required><input type="email" placeholder="Email" required><textarea rows="4" placeholder="Your message..."></textarea><button class="btn-primary" type="submit">Send Message</button><p id="formFeedback"></p></form></div><div style="flex:1"><i class="fas fa-envelope"></i> hello@kristyhaven.com<br><i class="fas fa-phone-alt"></i> +234 901 234 5678<br><div>Instagram | TikTok | Pinterest</div></div></div><div style="margin-top:3rem;"><h3>Newsletter (10% off first order)</h3><div><input type="email" id="newsEmail" placeholder="Your email"><button class="btn-primary" id="newsBtn">Subscribe</button><p id="newsMsg"></p></div></div></div>`;
  }

  function loadPage(page, param = null) {
    currentPage = page;
    let content = "";
    if (page === "home") content = renderHome();
    else if (page === "shop") content = renderShop();
    else if (page === "about") content = renderAbout();
    else if (page === "contact") content = renderContact();
    else if (page === "product" && param) content = renderProductDetail(param);
    else if (page === "payment") { content = renderPaymentPage(); setTimeout(() => attachPaymentEvents(), 20); }
    document.getElementById("app").innerHTML = content;
    if (page === "home") {
      const grid = document.getElementById("featuredGrid");
      if(grid) grid.innerHTML = products.slice(0,3).map(p => productCardHtml(p)).join("");
      attachProductEvents();
      document.getElementById("heroShopBtn")?.addEventListener("click",()=>loadPage("shop"));
    }
    if (page === "shop") {
      renderShopGrid("all");
      document.querySelectorAll(".filter-btn").forEach(btn => btn.addEventListener("click",(e)=>renderShopGrid(btn.dataset.filter)));
    }
    if (page === "product" && param) {
      document.getElementById("detailAddToCart")?.addEventListener("click",()=>{ addToCart(param); loadPage("product", param); });
      document.getElementById("detailBuyNow")?.addEventListener("click",()=>{ addToCart(param); openCart(); });
    }
    if (page === "contact") {
      const form = document.getElementById("contactForm");
      if(form) form.addEventListener("submit",(e)=>{e.preventDefault(); document.getElementById("formFeedback").innerText="Thanks! We'll reply within 24hrs 💌"; form.reset();});
      document.getElementById("newsBtn")?.addEventListener("click",()=>{ let email=document.getElementById("newsEmail").value; document.getElementById("newsMsg").innerHTML=email?"✨ Subscribed! Check your inbox.":"Enter email"; });
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function productCardHtml(p) {
    return `<div class="product-card glow-hover"><img src="${p.img}"><div class="product-title">${p.name}</div><div class="product-price">${formatNaira(p.price)}</div><button class="btn-primary add-to-cart-btn" data-id="${p.id}">Add to Cart</button><button class="btn-outline view-detail" data-id="${p.id}" style="margin-top:8px;">Quick View</button></div>`;
  }

  function renderShopGrid(category) {
    const filtered = category === "all" ? products : products.filter(p => p.category === category);
    const grid = document.getElementById("shopGrid");
    if(grid) { grid.innerHTML = filtered.map(p => productCardHtml(p)).join(""); attachProductEvents(); }
  }

  function attachProductEvents() {
    document.querySelectorAll(".add-to-cart-btn").forEach(btn => btn.addEventListener("click",(e)=>addToCart(parseInt(btn.dataset.id))));
    document.querySelectorAll(".view-detail").forEach(btn => btn.addEventListener("click",(e)=>loadPage("product", parseInt(btn.dataset.id))));
  }

  function openCart() { document.getElementById("cartModal").classList.add("open"); document.getElementById("overlay").classList.add("active"); renderCartModal(); }
  function closeCart() { document.getElementById("cartModal").classList.remove("open"); document.getElementById("overlay").classList.remove("active"); }

  document.addEventListener("DOMContentLoaded", () => {
    loadPage("home");
    document.querySelectorAll("[data-page]").forEach(link => link.addEventListener("click",(e)=>{ e.preventDefault(); loadPage(link.dataset.page); document.getElementById("navLinks")?.classList.remove("active"); }));
    document.getElementById("cartIcon")?.addEventListener("click", openCart);
    document.getElementById("closeCartBtn")?.addEventListener("click", closeCart);
    document.getElementById("overlay")?.addEventListener("click", closeCart);
    document.getElementById("proceedToPaymentBtn")?.addEventListener("click", () => { if(cart.length>0){ closeCart(); loadPage("payment"); } else { alert("Your cart is empty."); } });
    document.getElementById("menuToggle")?.addEventListener("click", () => document.getElementById("navLinks").classList.toggle("active"));
  });
</script>
</body>
</html>
